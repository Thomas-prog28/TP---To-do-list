<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <title>To do list</title>
</head>

<body>
    <header>
        <h1>Ma To do List</h1>
    </header>

    <form id="todo-form">
        <input id="todo-input" type="text" placeholder="Entre ta tâche">
        <button id="addTaskBtn" class="todo_btn" type="submit" value="Ajouter">Ajouter</button>
    </form>

    <div class="todo-filters">
        <button type="button" class="disabledBtn filter-btn active" data-filter="all">Toutes</button>
        <button type="button" class="disabledBtn filter-btn " data-filter="todo">À faire</button>
        <button type="button" class="disabledBtn filter-btn " data-filter="done">Faites</button>
    </div>

    <ul id="todo-list"></ul>

    <div id="cookie-banner">
        <p>Ce site utilise des cookies fonctionnels pour garantir la meilleure expérience.</p>
        <button id="cookieBtn">J'accepte</button>
    </div>
</body>

</html>
