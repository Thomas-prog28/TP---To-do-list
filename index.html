<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <title>To do list</title>
</head>

<body>
    <header>
        <h1 id="header__titre">Ma Todo List</h1>
    </header>

    <form class="form__todo">
        <input class="form__input" type="text" placeholder="Entre ta tâche">
        <button class="form__btn" type="submit" value="Ajouter">Ajouter</button>
    </form>

    <section class="filterarea">
        <div class="filterarea__btn">
            <button type="button" class="disabledBtn filter__btn active" data-filter="all">Toutes</button>
            <button type="button" class="disabledBtn filter__btn " data-filter="todo">À faire</button>
            <button type="button" class="disabledBtn filter__btn " data-filter="done">Faites</button>
        </div>

        <ul class="filterarea__list"></ul>
    </section>

    <div id="cookie__banner">
        <p>Ce site utilise des cookies fonctionnels pour garantir la meilleure expérience.</p>
        <button id="cookie__Btn">J'accepte</button>
    </div>

    <footer class="footer">
        <p class="footer__text">© 2026 — Ma Todo List</p>
        <div class="footer__links">
            <a href="#">Mentions légales</a>
            <a href="#">Confidentialité</a>
            <a href="#">Contact</a>
        </div>
    </footer>

</body>

</html>
